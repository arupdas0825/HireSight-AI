<svg viewBox="0 0 32 32" width="32" height="32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for electric blue to cyan glow -->
    <linearGradient id="logo-grad-primary" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#00f2ff"/>
    </linearGradient>
    
    <!-- Gradient for purple/indigo accents -->
    <linearGradient id="logo-grad-secondary" x1="30" y1="2" x2="2" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <!-- Deep neon glow shadow mask -->
    <filter id="logo-neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Outer scanning portal hexagon with premium smooth corners -->
  <path d="M16 2L28.12 9v14L16 30L3.88 23V9L16 2Z" stroke="url(#logo-grad-primary)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Career Growth Stepped Pillars integrated seamlessly inside the sight portal -->
  <!-- Left Pillar -->
  <rect x="8.5" y="16" width="2" height="5" rx="1" fill="url(#logo-grad-secondary)"/>
  <!-- Middle Pillar -->
  <rect x="12" y="11.5" width="2" height="9.5" rx="1" fill="url(#logo-grad-primary)"/>
  
  <!-- Concentric scanning radar arc representing recruiter insight -->
  <circle cx="16" cy="16" r="8.5" stroke="url(#logo-grad-primary)" stroke-width="1.25" stroke-dasharray="2.5 1.5" opacity="0.8"/>
  
  <!-- Deep core matching pupil / Diamond Star representing precision intelligence -->
  <path d="M16 9.5L18.2 13.8L22.5 16L18.2 18.2L16 22.5L13.8 18.2L9.5 16L13.8 13.8L16 9.5Z" fill="url(#logo-grad-primary)" filter="url(#logo-neon-glow)"/>
  
  <!-- Center focal matching dot -->
  <circle cx="16" cy="16" r="1.75" fill="#ffffff"/>
</svg>
